name: CD Staging

# Builds and pushes container images on every merge to main, as a versioned
# GHCR mirror for audit/rollback reference. Does NOT deploy anywhere -- the
# chosen target (Railway, see docs/runbook.md) builds directly from this repo
# via its own GitHub integration and does not consume these images, so no
# deploy job belongs here. See docs/runbook.md's "Choosing a target" section
# for why (short version: the frontend image needs the backend's live URL as
# a build arg, which Railway's reference variables resolve natively and a
# prebuilt image can't).

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            dockerfile: infra/docker/backend/Dockerfile
          - service: frontend
            dockerfile: infra/docker/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:staging
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:staging-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── No deploy job here by design ──────────────────────────────────────────
  # Railway auto-deploys on every push to its connected branch, building
  # straight from infra/docker/{backend,frontend}/Dockerfile in this repo.
  # See docs/runbook.md's "Choosing a target" section for the full setup and
  # why these GHCR images aren't what Railway deploys.
