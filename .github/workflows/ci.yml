name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check src tests
      - run: ruff format --check src tests

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pip-audit bandit
      - run: pip-audit
      - run: bandit -r src -ll

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armchatbot_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

      qdrant:
        image: qdrant/qdrant:v1.10.0
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6333:6333

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/armchatbot_test
      QDRANT_URL: http://localhost:6333
      REDIS_URL: redis://localhost:6379/0
      API_KEY: ci-test-key
      APP_ENV: test
      DEBUG: "false"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Download NLTK data
        run: python -c "import nltk; nltk.download('punkt_tab', quiet=True)"
      - name: Run Alembic migrations
        run: alembic upgrade head
      - name: Run unit tests (no LLM)
        run: pytest tests/unit -v --cov=src --cov-report=xml -m "not llm and not e2e"
      - name: Check core coverage >= 90%
        run: pytest tests/unit -v --cov=src/core --cov-fail-under=90 -m "not llm and not e2e"
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true
