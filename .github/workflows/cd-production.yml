name: CD Production

# Builds and pushes container images on a version tag (v1.2.3) as a versioned
# GHCR mirror for audit/rollback reference -- mirrors cd-staging.yml's build
# step. The actual deploy is a separate job below: Railway's default
# continuous-deploy-from-branch model doesn't fit "only deploy on a tagged
# release" (unlike cd-staging.yml, which relies on Railway auto-deploying
# every push to main), so this explicitly triggers a Railway redeploy of the
# `backend`/`frontend` services via the Railway CLI when a v* tag is pushed.
# Requires a RAILWAY_TOKEN repo secret (a Railway project token) -- see
# docs/runbook.md's "Choosing a target" section for how to create the
# project/services this references.

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            dockerfile: infra/docker/backend/Dockerfile
          - service: frontend
            dockerfile: infra/docker/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:latest
            ${{ env.IMAGE_BASE }}-${{ matrix.service }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Railway (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Trigger redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ matrix.service }} --detach

  # Rollback: redeploy the previous known-good tag the same way -- checkout
  # that tag, rerun this job (or `railway up` locally against the linked
  # project). See docs/runbook.md's Rollback section.
