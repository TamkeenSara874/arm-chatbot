services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: armchatbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d armchatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.0
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
      # Ingestion computes sparse (fastembed) vectors too; share the same
      # cache as backend so re-ingesting doesn't re-download the model.
      - fastembed-cache:/tmp/fastembed_cache
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/armchatbot
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_REVIEWS: review_chunks
      QDRANT_COLLECTION_CORRECTIONS: correction_embeddings
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "86400"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SIMPLE_MODEL: ${OPENAI_SIMPLE_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-large}
      EMBEDDING_DIM: "3072"
      ENTITY_EXTRACTION_BATCH_SIZE: "10"
      API_KEY: ${API_KEY:-change-me-local-dev-key}
      ALLOWED_ORIGINS: ""
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    command: >
      bash -c "
        pip install -e '.[dev]' -q &&
        python -c 'import nltk; nltk.download(\"punkt_tab\", quiet=True)' &&
        alembic upgrade head &&
        python scripts/seed.py
      "
    restart: "no"

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
      # Without these, the reranker (sentence-transformers, ~110MB, caches
      # to ~/.cache/huggingface) and sparse embedder (fastembed, caches to
      # /tmp/fastembed_cache -- confirmed via `find` inside the container,
      # NOT the huggingface hub dir) both re-download on every container
      # recreation (docker compose down && up), not just a restart.
      - hf-cache:/root/.cache/huggingface
      - fastembed-cache:/tmp/fastembed_cache
      - ./logs:/app/logs
    environment:
      APP_ENV: development
      DEBUG: "true"
      API_KEY: ${API_KEY:-change-me-local-dev-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/armchatbot
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_REVIEWS: review_chunks
      QDRANT_COLLECTION_CORRECTIONS: correction_embeddings
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "86400"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_SIMPLE_MODEL: ${OPENAI_SIMPLE_MODEL:-gpt-4o-mini}
      OPENAI_COMPLEX_MODEL: ${OPENAI_COMPLEX_MODEL:-gpt-4.1}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-large}
      GROQ_DECOMP_MODEL: ${GROQ_DECOMP_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_FALLBACK_MODEL: ${ANTHROPIC_FALLBACK_MODEL:-claude-sonnet-4-6}
      EMBEDDING_DIM: "3072"
      ENTITY_EXTRACTION_BATCH_SIZE: "10"
      HF_TOKEN: ${HF_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-32-chars-min}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    command: >
      bash -c "
        pip install -e '.[dev]' -q &&
        python -c 'import nltk; nltk.download(\"punkt_tab\", quiet=True)' &&
        alembic upgrade head &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Named volume shadows the bind mount's node_modules so native deps
      # installed for linux/musl inside the container aren't clobbered by
      # (or don't clobber) whatever's in the host's frontend/node_modules.
      - frontend-node-modules:/app/node_modules
    environment:
      # Empty VITE_API_URL keeps the frontend calling relative /api/v1/...
      # paths through Vite's dev proxy rather than an absolute URL -- the
      # proxy is what actually needs to know how to reach the backend
      # container (see VITE_API_PROXY_TARGET below).
      VITE_API_URL: ""
      VITE_API_KEY: ${API_KEY:-change-me-local-dev-key}
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  pip-cache:
  hf-cache:
  fastembed-cache:
  frontend-node-modules:
