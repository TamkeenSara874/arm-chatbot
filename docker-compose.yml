services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: armchatbot
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d armchatbot"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.10.0
    volumes:
      - qdrant-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  seed:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
      # Ingestion computes sparse (fastembed) vectors too; share the same
      # cache as backend so re-ingesting doesn't re-download the model.
      - fastembed-cache:/tmp/fastembed_cache
    environment:
      APP_ENV: development
      DEBUG: "true"
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/armchatbot
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_REVIEWS: review_chunks
      QDRANT_COLLECTION_CORRECTIONS: correction_embeddings
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "86400"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SIMPLE_MODEL: ${OPENAI_SIMPLE_MODEL:-gpt-4o-mini}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-large}
      EMBEDDING_DIM: "3072"
      ENTITY_EXTRACTION_BATCH_SIZE: "10"
      API_KEY: ${API_KEY:-change-me-local-dev-key}
      ALLOWED_ORIGINS: ""
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    command: >
      bash -c "
        pip install -e '.[dev]' -q &&
        python -c 'import nltk; nltk.download(\"punkt_tab\", quiet=True)' &&
        alembic upgrade head &&
        python scripts/seed.py
      "
    restart: "no"

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
      - pip-cache:/root/.cache/pip
      # Without these, the reranker (sentence-transformers, ~110MB, caches
      # to ~/.cache/huggingface) and sparse embedder (fastembed, caches to
      # /tmp/fastembed_cache -- confirmed via `find` inside the container,
      # NOT the huggingface hub dir) both re-download on every container
      # recreation (docker compose down && up), not just a restart.
      - hf-cache:/root/.cache/huggingface
      - fastembed-cache:/tmp/fastembed_cache
      - ./logs:/app/logs
    environment:
      APP_ENV: development
      DEBUG: "true"
      API_KEY: ${API_KEY:-change-me-local-dev-key}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/armchatbot
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION_REVIEWS: review_chunks
      QDRANT_COLLECTION_CORRECTIONS: correction_embeddings
      REDIS_URL: redis://redis:6379/0
      CACHE_TTL_SECONDS: "86400"
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_API_KEYS: ${GROQ_API_KEYS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_SIMPLE_MODEL: ${OPENAI_SIMPLE_MODEL:-gpt-4o-mini}
      OPENAI_COMPLEX_MODEL: ${OPENAI_COMPLEX_MODEL:-gpt-4.1}
      OPENAI_EMBED_MODEL: ${OPENAI_EMBED_MODEL:-text-embedding-3-large}
      GROQ_DECOMP_MODEL: ${GROQ_DECOMP_MODEL:-llama-3.3-70b-versatile}
      ANTHROPIC_FALLBACK_MODEL: ${ANTHROPIC_FALLBACK_MODEL:-claude-sonnet-4-6}
      RERANKER_MODEL: ${RERANKER_MODEL:-cross-encoder/ms-marco-MiniLM-L6-v2}
      RERANKER_ONNX_QUANTIZED: ${RERANKER_ONNX_QUANTIZED:-true}
      RERANKER_ONNX_QUANTIZATION_CONFIG: ${RERANKER_ONNX_QUANTIZATION_CONFIG:-avx2}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-8}
      EMBEDDING_DIM: "3072"
      ENTITY_EXTRACTION_BATCH_SIZE: "10"
      HF_TOKEN: ${HF_TOKEN:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-jwt-secret-32-chars-min}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    command: >
      bash -c "
        pip install -e '.[dev]' -q &&
        python -c 'import nltk; nltk.download(\"punkt_tab\", quiet=True)' &&
        alembic upgrade head &&
        uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # Optional local observability stack -- does not start on a plain
  # `docker compose up`. Bring it up explicitly with:
  #   docker compose --profile monitoring up -d prometheus grafana
  # then browse http://localhost:9090 (Prometheus) or http://localhost:3001
  # (Grafana -- dashboard auto-loads, nothing to click through). See
  # infra/prometheus/prometheus.yml for the scrape config (targets
  # GET /health/metrics on the backend) and infra/grafana/README.md for how
  # the dashboard/datasource provisioning works.
  prometheus:
    image: prom/prometheus:v2.53.0
    profiles: ["monitoring"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:11.1.0
    profiles: ["monitoring"]
    environment:
      # Local dev only -- change-me pattern matches every other placeholder
      # credential in this repo (API_KEY, JWT_SECRET, etc.). Real deployments
      # must override both via env vars, never commit real values here.
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me-local-dev-password}
      # Provisioned datasource/dashboard below are the source of truth --
      # disable Grafana's own onboarding/anonymous-signup prompts so the
      # dashboard is the first and only thing an operator sees.
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Host port 3001, not the Grafana default 3000 -- this machine
      # routinely runs other Docker projects with their own Grafana bound to
      # 3000 (confirmed live: a completely unrelated project's container
      # already held that port), so hardcoding 3000 here would randomly fail
      # to start depending on what else happens to be running.
      - "3001:3000"
    depends_on:
      - prometheus

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      # Named volume shadows the bind mount's node_modules so native deps
      # installed for linux/musl inside the container aren't clobbered by
      # (or don't clobber) whatever's in the host's frontend/node_modules.
      - frontend-node-modules:/app/node_modules
    environment:
      # Empty VITE_API_URL keeps the frontend calling relative /api/v1/...
      # paths through Vite's dev proxy rather than an absolute URL -- the
      # proxy is what actually needs to know how to reach the backend
      # container (see VITE_API_PROXY_TARGET below).
      VITE_API_URL: ""
      VITE_API_KEY: ${API_KEY:-change-me-local-dev-key}
      VITE_API_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  postgres-data:
  qdrant-data:
  redis-data:
  pip-cache:
  hf-cache:
  fastembed-cache:
  frontend-node-modules:
  prometheus-data:
  grafana-data:
